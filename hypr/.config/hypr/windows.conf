# windows.conf — window rules
# https://wiki.hyprland.org/Configuring/Window-Rules/
# Hyprland 0.53+ syntax

# ── Base rules ────────────────────────────────────────────────────────────────

# Suppress maximize — tiling WM, maximize doesn't make sense
windowrule = suppress_event maximize, match:class .*

# Tag all windows for default opacity — apps can opt out below
windowrule = tag +default-opacity, match:class .*

# Fix XWayland drag issues
windowrule = no_focus on, match:class ^$, match:title ^$, match:xwayland 1, match:float 1, match:fullscreen 0, match:pin 0

# ── Floating windows ──────────────────────────────────────────────────────────

# TUI apps launched via tui-entries.sh with --app-id=TUI.float
windowrule = float on,     match:class TUI.float
windowrule = center on,    match:class TUI.float
windowrule = size 875 600, match:class TUI.float

# File dialogs — float open/save dialogs from GTK apps
windowrule = float on, match:class (xdg-desktop-portal-gtk|org.gnome.Nautilus), match:title ^(Open.*|Save.*|Choose.*)

# Standalone float apps
windowrule = float on,  match:class (org.gnome.Calculator|org.gnome.NautilusPreviewer|imv|mpv)
windowrule = center on, match:class (org.gnome.Calculator|org.gnome.NautilusPreviewer)

# 1Password — float + block from screenshare capture
windowrule = float on,           match:class ^(1[pP]assword)$
windowrule = center on,          match:class ^(1[pP]assword)$
windowrule = no_screen_share on, match:class ^(1[pP]assword)$

# LocalSend — float file sharing dialog
windowrule = float on,     match:class (Share|localsend)
windowrule = center on,    match:class (Share|localsend)
windowrule = size 1100 700, match:class localsend

# Moonlight — fullscreen game streaming, inhibit idle
windowrule = fullscreen on,         match:class com.moonlight_stream.Moonlight
windowrule = idle_inhibit fullscreen, match:class com.moonlight_stream.Moonlight

# ── Layer rules ───────────────────────────────────────────────────────────────

# Walker — no animation on launcher layer
layerrule = no_anim on, match:namespace walker

# Screenshot selection overlay (slurp/hyprshot) — no border animation
layerrule = no_anim on, match:namespace selection

# ── Opacity ───────────────────────────────────────────────────────────────────

# Terminals — slight transparency, blur does the rest
windowrule = tag -default-opacity, match:class (com.mitchellh.ghostty|kitty)
windowrule = opacity 0.97 0.9,     match:class (com.mitchellh.ghostty|kitty)

# Browsers — active full opacity, slight fade when unfocused
windowrule = tag -default-opacity, match:class (chromium|Chromium|firefox|Firefox)
windowrule = tile on,              match:class (chromium|Chromium)
windowrule = opacity 1.0 0.97,     match:class (chromium|Chromium|firefox|Firefox)

# Media — no transparency on anything visual
windowrule = tag -default-opacity, match:class ^(mpv|imv|org.kde.kdenlive|com.obsproject.Studio|com.github.PintaProject.Pinta|org.gnome.NautilusPreviewer)$
windowrule = opacity 1 1,          match:class ^(mpv|imv|org.kde.kdenlive|com.obsproject.Studio|com.github.PintaProject.Pinta|org.gnome.NautilusPreviewer)$

# Apply default opacity to everything that hasn't opted out
windowrule = opacity 0.97 0.9, match:tag default-opacity

# ── Picture-in-picture ────────────────────────────────────────────────────────
windowrule = tag +pip,             match:title (Picture.?in.?[Pp]icture)
windowrule = tag -default-opacity, match:tag pip
windowrule = float on,             match:tag pip
windowrule = pin on,               match:tag pip
windowrule = size 600 338,         match:tag pip
windowrule = keep_aspect_ratio on, match:tag pip
windowrule = border_size 0,        match:tag pip
windowrule = opacity 1 1,          match:tag pip
windowrule = move (monitor_w-window_w-40) (monitor_h*0.04), match:tag pip

# ── Idle inhibit ──────────────────────────────────────────────────────────────
windowrule = idle_inhibit always, match:class ^(mpv|imv|com.obsproject.Studio)$
