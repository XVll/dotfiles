# Tokyo Night Night palette
$blue     = rgba(7aa2f7ee)
$purple   = rgba(bb9af7ee)
$cyan     = rgba(7dcfffee)
$bg       = rgba(1a1b26aa)
$bgDark   = rgba(16161eee)

general {
    gaps_in = 5
    gaps_out = 10
    border_size = 2
    col.active_border = $blue $purple 45deg
    col.inactive_border = $bg
    resize_on_border = false
    allow_tearing = false
    layout = dwindle
}

decoration {
    rounding = 8

    shadow {
        enabled = true
        range = 8
        render_power = 3
        color = $bgDark
    }

    blur {
        enabled = true
        size = 4
        passes = 2
        special = true
        brightness = 0.75
        contrast = 0.9
    }
}

animations {
    enabled = yes

    bezier = easeOutQuint, 0.23, 1, 0.32, 1
    bezier = almostLinear, 0.5, 0.5, 0.75, 1.0
    bezier = quick, 0.15, 0, 0.1, 1

    animation = global,     1, 10, default
    animation = border,     1, 5,  easeOutQuint
    animation = windows,    1, 5,  easeOutQuint
    animation = windowsIn,  1, 4,  easeOutQuint, popin 87%
    animation = windowsOut, 1, 2,  almostLinear, popin 87%
    animation = fade,       1, 3,  quick
    animation = layers,     1, 4,  easeOutQuint
    animation = layersIn,   1, 4,  easeOutQuint, fade
    animation = layersOut,  1, 2,  almostLinear, fade
    animation = workspaces, 1, 4,  easeOutQuint, slide
    animation = specialWorkspace, 1, 4, easeOutQuint, slidevert
}

dwindle {
    pseudotile = true
    preserve_split = true
    force_split = 2
}

misc {
    disable_hyprland_logo = true
    disable_splash_rendering = true
    focus_on_activate = true
    key_press_enables_dpms = true
    mouse_move_enables_dpms = true
}

cursor {
    hide_on_key_press = true
    warp_on_change_workspace = 1
}

binds {
    hide_special_on_workspace_change = true
}
