# envs.conf — environment variables for the Hyprland session
# https://wiki.hyprland.org/Configuring/Environment-variables/

# VM software rendering — remove if running on real hardware with a GPU
env = WLR_RENDERER,pixman
env = WLR_NO_HARDWARE_CURSORS,1

# Cursor size
env = XCURSOR_SIZE,24
env = HYPRCURSOR_SIZE,24

# Force all apps to use Wayland native rendering
env = GDK_BACKEND,wayland,x11,*
env = QT_QPA_PLATFORM,wayland;xcb
env = QT_STYLE_OVERRIDE,kvantum
env = SDL_VIDEODRIVER,wayland,x11
env = MOZ_ENABLE_WAYLAND,1
env = ELECTRON_OZONE_PLATFORM_HINT,wayland
env = OZONE_PLATFORM,wayland
env = XDG_SESSION_TYPE,wayland

# Required for screen sharing (Google Meet, Discord, etc.)
env = XDG_CURRENT_DESKTOP,Hyprland
env = XDG_SESSION_DESKTOP,Hyprland

# Use XCompose file for custom key compositions
env = XCOMPOSEFILE,~/.XCompose

xwayland {
    force_zero_scaling = true
}

ecosystem {
    no_update_news = true
}
