# autostart.conf — programs launched once at Hyprland startup
# https://wiki.hyprland.org/Configuring/Keywords/#executing

# ── Core session ──────────────────────────────────────────────────────────────
# Import environment into systemd user session and dbus — ensures apps launched
# via systemd/dbus activation (file managers, portals, etc.) see Hyprland env vars
exec-once = systemctl --user import-environment $(env | cut -d'=' -f 1)
exec-once = dbus-update-activation-environment --systemd --all

# Polkit auth agent — handles privilege prompts (sudo GUI dialogs in apps)
exec-once = /usr/lib/polkit-gnome/polkit-gnome-authentication-agent-1

# ── Desktop services ──────────────────────────────────────────────────────────
exec-once = uwsm-app -- hyprpaper   # wallpaper
exec-once = uwsm-app -- hypridle    # idle management (triggers hyprlock + display off)
exec-once = uwsm-app -- waybar      # status bar
exec-once = uwsm-app -- mako        # notification daemon
exec-once = uwsm-app -- swayosd-server # OSD for volume/brightness/capslock

# ── Optional ──────────────────────────────────────────────────────────────────
# exec-once = uwsm-app -- hyprsunset  # blue light filter (configure hyprsunset.conf first)
