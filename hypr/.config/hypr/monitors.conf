# monitors.conf — monitor layout, resolution, scale, rotation
# https://wiki.hyprland.org/Configuring/Monitors/
#
# To find your connector names, boot into Hyprland and run:
#   hyprctl monitors
# Then replace DP-1 / DP-2 below with your actual connector names.
#
# Syntax: monitor = name, resolution@hz, position, scale

# Left monitor
monitor = DP-2, 1920x1080@75, 0x0, 1

# Right monitor (positioned at x=1920)
monitor = HDMI-A-1, 1920x1080@75, 1920x0, 1
