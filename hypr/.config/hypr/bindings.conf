$mod = SUPER

# Apps
# ARM VM: kitty | CachyOS: ghostty
bindd = $mod, Return,      Terminal,     exec, uwsm app -- kitty
bindd = $mod, D,           App launcher, exec, uwsm app -- wofi --show drun
bindd = $mod, E,           File manager, exec, uwsm app -- nautilus
bindd = $mod, N,           Neovim,       exec, uwsm app -- kitty -e nvim

# Window management
bindd = $mod, W,           Close window,          killactive
bindd = $mod, F,           Fullscreen,            fullscreen, 0
bindd = $mod CTRL, F,      Tiled fullscreen,      fullscreenstate, 0 2
bindd = $mod, T,           Toggle floating,       togglefloating

# Focus — arrow keys (omarchy style) + vim hjkl
bindd = $mod, left,  Focus left,  movefocus, l
bindd = $mod, right, Focus right, movefocus, r
bindd = $mod, up,    Focus up,    movefocus, u
bindd = $mod, down,  Focus down,  movefocus, d
bindd = $mod, H,     Focus left,  movefocus, l
bindd = $mod, L,     Focus right, movefocus, r
bindd = $mod, K,     Focus up,    movefocus, u
bindd = $mod, J,     Focus down,  movefocus, d

# Move windows
bindd = $mod SHIFT, left,  Swap left,  swapwindow, l
bindd = $mod SHIFT, right, Swap right, swapwindow, r
bindd = $mod SHIFT, up,    Swap up,    swapwindow, u
bindd = $mod SHIFT, down,  Swap down,  swapwindow, d
bindd = $mod SHIFT, H,     Swap left,  swapwindow, l
bindd = $mod SHIFT, L,     Swap right, swapwindow, r
bindd = $mod SHIFT, K,     Swap up,    swapwindow, u
bindd = $mod SHIFT, J,     Swap down,  swapwindow, d

# Resize
bindd = $mod, minus,  Expand left,  resizeactive, -100 0
bindd = $mod, equal,  Shrink left,  resizeactive, 100 0

# Workspaces 1-9
bindd = $mod, code:10, Switch to workspace 1,  workspace, 1
bindd = $mod, code:11, Switch to workspace 2,  workspace, 2
bindd = $mod, code:12, Switch to workspace 3,  workspace, 3
bindd = $mod, code:13, Switch to workspace 4,  workspace, 4
bindd = $mod, code:14, Switch to workspace 5,  workspace, 5
bindd = $mod, code:15, Switch to workspace 6,  workspace, 6
bindd = $mod, code:16, Switch to workspace 7,  workspace, 7
bindd = $mod, code:17, Switch to workspace 8,  workspace, 8
bindd = $mod, code:18, Switch to workspace 9,  workspace, 9

bindd = $mod SHIFT, code:10, Move to workspace 1,  movetoworkspace, 1
bindd = $mod SHIFT, code:11, Move to workspace 2,  movetoworkspace, 2
bindd = $mod SHIFT, code:12, Move to workspace 3,  movetoworkspace, 3
bindd = $mod SHIFT, code:13, Move to workspace 4,  movetoworkspace, 4
bindd = $mod SHIFT, code:14, Move to workspace 5,  movetoworkspace, 5
bindd = $mod SHIFT, code:15, Move to workspace 6,  movetoworkspace, 6
bindd = $mod SHIFT, code:16, Move to workspace 7,  movetoworkspace, 7
bindd = $mod SHIFT, code:17, Move to workspace 8,  movetoworkspace, 8
bindd = $mod SHIFT, code:18, Move to workspace 9,  movetoworkspace, 9

# Tab through workspaces
bindd = $mod, TAB,       Next workspace,     workspace, e+1
bindd = $mod SHIFT, TAB, Previous workspace, workspace, e-1

# Scratchpad
bindd = $mod, S,       Toggle scratchpad,       togglespecialworkspace, scratchpad
bindd = $mod ALT, S,   Move to scratchpad,      movetoworkspacesilent, special:scratchpad

# Mouse
bindmd = $mod, mouse:272, Move window,   movewindow
bindmd = $mod, mouse:273, Resize window, resizewindow
bindd = $mod, mouse_down, Next workspace,     workspace, e+1
bindd = $mod, mouse_up,   Previous workspace, workspace, e-1

# Cycle windows
bindd = ALT, TAB,       Next window, cyclenext
bindd = ALT SHIFT, TAB, Prev window, cyclenext, prev

# Screenshot
bindd = , Print, Screenshot region, exec, grim -g "$(slurp)" - | wl-copy

# Notifications
bindd = $mod, COMMA,       Dismiss notification,     exec, makoctl dismiss
bindd = $mod SHIFT, COMMA, Dismiss all notifications, exec, makoctl dismiss --all

# Volume (media keys)
bindeld = , XF86AudioRaiseVolume, Volume up,   exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%+
bindeld = , XF86AudioLowerVolume, Volume down, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%-
bindeld = , XF86AudioMute,        Mute,        exec, wpctl set-mute @DEFAULT_AUDIO_SINK@ toggle

# Brightness (media keys)
bindeld = , XF86MonBrightnessUp,   Brightness up,   exec, brightnessctl set 5%+
bindeld = , XF86MonBrightnessDown, Brightness down, exec, brightnessctl set 5%-

# Media playback
bindld = , XF86AudioPlay, Play/Pause, exec, playerctl play-pause
bindld = , XF86AudioNext, Next track, exec, playerctl next
bindld = , XF86AudioPrev, Prev track, exec, playerctl previous

# Lock
bindd = $mod CTRL, L, Lock screen, exec, hyprlock

# Exit session
bindd = $mod SHIFT, E, Exit session, exec, uwsm stop
