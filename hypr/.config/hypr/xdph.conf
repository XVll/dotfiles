# xdph.conf — xdg-desktop-portal-hyprland configuration
# https://wiki.hyprland.org/Hypr-Ecosystem/xdg-desktop-portal-hyprland/

screencopy {
    allow_token_by_default = true                          # no permission prompt on every screenshare
    custom_picker_binary   = hyprland-preview-share-picker # window picker UI for screenshare selection
}
