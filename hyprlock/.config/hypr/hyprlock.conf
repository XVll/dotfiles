# hyprlock — GPU-accelerated lock screen
# Theme colors sourced from ~/.config/theme/current/hyprlock.conf (generated by theme-set)
source = ~/.config/theme/current/hyprlock.conf

# Variables set by the theme source above:
#   $bg_color     — opaque background
#   $bg_blur      — semi-transparent background (for blurred areas)
#   $fg_color     — foreground / text color
#   $accent_color — accent / highlight color

general {
  hide_cursor = true
  grace = 0
}

background {
  monitor =
  color = $bg_color
  blur_passes = 2
  blur_size = 7
}

input-field {
  monitor =
  size = 280, 50
  outline_thickness = 2
  dots_size = 0.3
  dots_spacing = 0.2
  outer_color = $accent_color
  inner_color = $bg_blur
  font_color = $fg_color
  fade_on_empty = true
  placeholder_text = <i>Password</i>
  position = 0, -80
  halign = center
  valign = center
}

label {
  monitor =
  text = cmd[update:1000] echo "<b>$(date '+%H:%M')</b>"
  color = $fg_color
  font_size = 64
  font_family = JetBrainsMono Nerd Font
  position = 0, 80
  halign = center
  valign = center
}

label {
  monitor =
  text = cmd[update:60000] echo "$(date '+%A, %d %B %Y')"
  color = $fg_color
  font_size = 16
  font_family = JetBrainsMono Nerd Font
  position = 0, 0
  halign = center
  valign = center
}
