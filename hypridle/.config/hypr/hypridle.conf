# hypridle.conf — idle daemon: dim → lock → display off
# https://wiki.hyprland.org/Hypr-Ecosystem/hypridle/

general {
    lock_cmd         = hyprlock              # command to lock the screen
    before_sleep_cmd = loginctl lock-session # lock before suspend
    after_sleep_cmd  = sleep 1 && hyprctl dispatch dpms on # delay for PAM, then display on
    inhibit_sleep    = 3                     # wait until locked before allowing sleep
}

listener {
    timeout  = 300                           # 5min — turn off display
    on-timeout = hyprctl dispatch dpms off
    on-resume  = hyprctl dispatch dpms on
}

listener {
    timeout  = 310                           # 5min 10s — lock screen after display off
    on-timeout = loginctl lock-session
}
