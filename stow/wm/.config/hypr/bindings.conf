# ═════════════════════════════════════════════════════════════════════════════
# WORKSPACE
# ═════════════════════════════════════════════════════════════════════════════

# ── Switch to workspace ──
bindd = SUPER, 1, Switch to workspace 1, workspace, 1
bindd = SUPER, 2, Switch to workspace 2, workspace, 2
bindd = SUPER, 3, Switch to workspace 3, workspace, 3
bindd = SUPER, 4, Switch to workspace 4, workspace, 4
bindd = SUPER, 5, Switch to workspace 5, workspace, 5
bindd = SUPER, 6, Switch to workspace 6, workspace, 6
bindd = SUPER, 7, Switch to workspace 7, workspace, 7
bindd = SUPER, 8, Switch to workspace 8, workspace, 8
bindd = SUPER, 9, Switch to workspace 9, workspace, 9
bindd = SUPER, TAB, Last workspace, workspace, previous

# ── Send window to workspace (silent — window goes, you stay) ──
bindd = SUPER SHIFT, 1, Send window to workspace 1, movetoworkspacesilent, 1
bindd = SUPER SHIFT, 2, Send window to workspace 2, movetoworkspacesilent, 2
bindd = SUPER SHIFT, 3, Send window to workspace 3, movetoworkspacesilent, 3
bindd = SUPER SHIFT, 4, Send window to workspace 4, movetoworkspacesilent, 4
bindd = SUPER SHIFT, 5, Send window to workspace 5, movetoworkspacesilent, 5
bindd = SUPER SHIFT, 6, Send window to workspace 6, movetoworkspacesilent, 6
bindd = SUPER SHIFT, 7, Send window to workspace 7, movetoworkspacesilent, 7
bindd = SUPER SHIFT, 8, Send window to workspace 8, movetoworkspacesilent, 8
bindd = SUPER SHIFT, 9, Send window to workspace 9, movetoworkspacesilent, 9
bindd = SUPER SHIFT, TAB, Send window to last workspace, movetoworkspacesilent, previous

# ── Workspace ops (submap) ──
bindd = SUPER, W, Workspace ops, exec, notify-send -t 3000 "Workspace" "H/L = workspace to monitor   R = rename workspace" && hyprctl dispatch submap workspace

submap = workspace
bindd = , H, Move workspace to left monitor, movecurrentworkspacetomonitor, l
bind  = , H, submap, reset
bindd = , L, Move workspace to right monitor, movecurrentworkspacetomonitor, r
bind  = , L, submap, reset
bindd = , R, Rename workspace, exec, dms ipc call workspace-rename open
bind  = , R, submap, reset
bind  = , escape, submap, reset
bind  = , return, submap, reset
submap = reset

# ── Scratchpad (special workspace) ──
bindd = SUPER, 0, Toggle scratchpad, togglespecialworkspace, scratchpad
bindd = SUPER SHIFT, 0, Move window to scratchpad, movetoworkspacesilent, special:scratchpad


# ═════════════════════════════════════════════════════════════════════════════
# WINDOW
# ═════════════════════════════════════════════════════════════════════════════

# ── Close ──
bind = SUPER, Q, killactive

# ── State toggles ──
bind = SUPER, F, fullscreen, 1
bind = SUPER SHIFT, F, fullscreen, 0
bind = SUPER, T, togglefloating

# ── Focus window ──
bind = SUPER, H, movefocus, l
bind = SUPER, J, movefocus, d
bind = SUPER, K, movefocus, u
bind = SUPER, L, movefocus, r
bindd = ALT, TAB, Cycle to next window, cyclenext
bindd = ALT SHIFT, TAB, Cycle to prev window, cyclenext, prev

# ── Move window ──
bind = SUPER SHIFT, H, movewindow, l
bind = SUPER SHIFT, J, movewindow, d
bind = SUPER SHIFT, K, movewindow, u
bind = SUPER SHIFT, L, movewindow, r
bindm = SUPER, mouse:272, movewindow

# ── Resize / layout ──
binde = SUPER CTRL, H, resizeactive, -5% 0
binde = SUPER CTRL, J, resizeactive, 0 5%
binde = SUPER CTRL, K, resizeactive, 0 -5%
binde = SUPER CTRL, L, resizeactive, 5% 0
bindd = SUPER, M, Promote to master, layoutmsg, swapwithmaster
bindm = SUPER, mouse:273, resizewindow

# ── Groups (submap) ──
bindd = SUPER, G, Groups menu, exec, notify-send -t 3000 "Groups" "HJKL=move in  O=out  Tab=cycle  1-5=jump  T=toggle group" && hyprctl dispatch submap groups

submap = groups
bindd = , H, Move into group left, moveintogroup, l
bindd = , J, Move into group down, moveintogroup, d
bindd = , K, Move into group up, moveintogroup, u
bindd = , L, Move into group right, moveintogroup, r
bindd = , O, Move out of group, moveoutofgroup
bindd = , TAB, Next window in group, changegroupactive, f
bindd = SHIFT, TAB, Previous window in group, changegroupactive, b
bindd = , 1, Switch to group window 1, changegroupactive, 1
bindd = , 2, Switch to group window 2, changegroupactive, 2
bindd = , 3, Switch to group window 3, changegroupactive, 3
bindd = , 4, Switch to group window 4, changegroupactive, 4
bindd = , 5, Switch to group window 5, changegroupactive, 5
bindd = , T, Toggle group, togglegroup
bind  = , T, submap, reset
bind  = , escape, submap, reset
bind  = , return, submap, reset
submap = reset


# ═════════════════════════════════════════════════════════════════════════════
# LAUNCHERS
# ═════════════════════════════════════════════════════════════════════════════

# ── Top-tier launchers (direct) ──
bindd = SUPER, Return, Terminal, exec, ghostty
bindd = SUPER, Space, Spotlight, exec, dms ipc call spotlight toggle

# Launcher submap (second-tier)
bindd = SUPER, comma, Launchers menu, exec, notify-send -t 3000 "Launchers" "M=tmux  V=clipboard  P=processlist  N=notifications  J=notepad  W=wallpaper  O=overview  K=keybinds  R=window rules  ,=settings" && hyprctl dispatch submap launchers

submap = launchers
bindd = , M, Tmux, exec, ghostty -e tmux new
bind  = , M, submap, reset
bindd = , V, Clipboard, exec, dms ipc call clipboard toggle
bind  = , V, submap, reset
bindd = , P, Processlist, exec, dms ipc call processlist focusOrToggle
bind  = , P, submap, reset
bindd = , N, Notifications, exec, dms ipc call notifications toggle
bind  = , N, submap, reset
bindd = , J, Notepad, exec, dms ipc call notepad toggle
bind  = , J, submap, reset
bindd = , W, Wallpaper, exec, dms ipc call dankdash wallpaper
bind  = , W, submap, reset
bindd = , O, Overview, exec, dms ipc call hypr toggleOverview
bind  = , O, submap, reset
bindd = , K, Keybinds, exec, dms ipc call keybinds toggle hyprland
bind  = , K, submap, reset
bindd = , R, Toggle window rules, exec, dms ipc call window-rules toggle
bind  = , R, submap, reset
bindd = , comma, Settings, exec, dms ipc call settings focusOrToggle
bind  = , comma, submap, reset
bind  = , escape, submap, reset
bind  = , return, submap, reset
submap = reset


# ═════════════════════════════════════════════════════════════════════════════
# CLIPBOARD
# ═════════════════════════════════════════════════════════════════════════════

bind = SUPER, C, sendshortcut, CTRL, Insert,
bind = SUPER, V, sendshortcut, SHIFT, Insert,
bind = SUPER, X, sendshortcut, CTRL, X,


# ═════════════════════════════════════════════════════════════════════════════
# CAPTURE
# ═════════════════════════════════════════════════════════════════════════════

# Direct region screenshot (most-used, bare hardware key)
bind = , Print, exec, dms screenshot

# Capture submap for variants (Print key = region, direct)
bindd = SUPER, P, Capture menu, exec, notify-send -t 3000 "Capture" "F=full  W=window  C=color pick" && hyprctl dispatch submap capture

submap = capture
bindd = , F, Screenshot full, exec, dms screenshot full
bind  = , F, submap, reset
bindd = , W, Screenshot window, exec, dms screenshot window
bind  = , W, submap, reset
bindd = , C, Color picker, exec, dms color pick
bind  = , C, submap, reset
bind  = , escape, submap, reset
bind  = , return, submap, reset
submap = reset


# ═════════════════════════════════════════════════════════════════════════════
# SYSTEM
# ═════════════════════════════════════════════════════════════════════════════

bindd = SUPER, BackSpace, System menu, exec, notify-send -t 3000 "System" "L=lock  E=exit  P=power  D=display off  N=nightlight  Q=close all windows" && hyprctl dispatch submap system

submap = system
bindd = , L, Lock, exec, dms ipc call lock lock
bind  = , L, submap, reset
bindd = , E, Exit session, exit
bind  = , E, submap, reset
bindd = , P, Power menu, exec, dms ipc call powermenu toggle
bind  = , P, submap, reset
bindd = , D, Toggle display off, dpms, toggle
bind  = , D, submap, reset
bindd = , N, Toggle nightlight, exec, dms ipc call night toggle
bind  = , N, submap, reset
bindd = , Q, Close all windows, exec, hyprctl clients -j | jq -r '.[].address' | xargs -I{} hyprctl dispatch killwindow address:{}
bind  = , Q, submap, reset
bind  = , escape, submap, reset
bind  = , return, submap, reset
submap = reset


# ═════════════════════════════════════════════════════════════════════════════
# MEDIA
# ═════════════════════════════════════════════════════════════════════════════

# ── Audio ──
bindel = , XF86AudioRaiseVolume, exec, dms ipc call audio increment 3
bindel = , XF86AudioLowerVolume, exec, dms ipc call audio decrement 3
bindl = , XF86AudioMute, exec, dms ipc call audio mute
bindl = , XF86AudioMicMute, exec, dms ipc call audio micmute

# ── Playback (MPRIS) ──
bindl = , XF86AudioPause, exec, dms ipc call mpris playPause
bindl = , XF86AudioPlay, exec, dms ipc call mpris playPause
bindl = , XF86AudioPrev, exec, dms ipc call mpris previous
bindl = , XF86AudioNext, exec, dms ipc call mpris next

# ── Brightness ──
bindel = , XF86MonBrightnessUp, exec, dms ipc call brightness increment 5 ""
bindel = , XF86MonBrightnessDown, exec, dms ipc call brightness decrement 5 ""
