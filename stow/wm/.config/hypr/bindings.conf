# ── T3: Monitor ──
bindd = SUPER CTRL, H, Focus monitor left, focusmonitor, l
bindd = SUPER CTRL, L, Focus monitor right, focusmonitor, r
bindd = SUPER SHIFT CTRL, H, Send window to monitor left, movewindow, mon:l
bindd = SUPER SHIFT CTRL, L, Send window to monitor right, movewindow, mon:r
bindd = SUPER SHIFT ALT, LEFT, Move workspace to left monitor, movecurrentworkspacetomonitor, l
bindd = SUPER SHIFT ALT, RIGHT, Move workspace to right monitor, movecurrentworkspacetomonitor, r


