# ── Session ──
bind = SUPER ALT, L, exec, dms ipc call lock lock
bind = SUPER SHIFT, E, exit
bind = SUPER SHIFT, X, exec, dms ipc call powermenu toggle
bindld = , XF86PowerOff, Power menu, exec, dms ipc call powermenu toggle

# ── Display ──
