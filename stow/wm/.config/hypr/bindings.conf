# LAUNCHERS — submap
# ═════════════════════════════════════════════════════════════════════════════

# Universal convention (stays global)
bind = CTRL ALT, Delete, exec, dms ipc call processlist focusOrToggle

# Launcher submap
bindd = SUPER, comma, Launchers menu, exec, notify-send -t 3000 "Launchers" "T=terminal  M=tmux  S=spotlight  V=clipboard  P=processlist  N=notifications  J=notepad  W=wallpaper  O=overview  K=keybinds  ,=settings" && hyprctl dispatch submap launchers

submap = launchers
bindd = , T, Terminal, exec, ghostty
bind  = , T, submap, reset
bindd = , M, Tmux, exec, ghostty -e tmux new
bind  = , M, submap, reset
bindd = , S, Spotlight, exec, dms ipc call spotlight toggle
bind  = , S, submap, reset
bindd = , V, Clipboard, exec, dms ipc call clipboard toggle
bind  = , V, submap, reset
bindd = , P, Processlist, exec, dms ipc call processlist focusOrToggle
bind  = , P, submap, reset
bindd = , N, Notifications, exec, dms ipc call notifications toggle
bind  = , N, submap, reset
bindd = , J, Notepad, exec, dms ipc call notepad toggle
bind  = , J, submap, reset
bindd = , W, Wallpaper, exec, dms ipc call dankdash wallpaper
bind  = , W, submap, reset
bindd = , O, Overview, exec, dms ipc call hypr toggleOverview
bind  = , O, submap, reset
bindd = , K, Keybinds, exec, dms ipc call keybinds toggle hyprland
bind  = , K, submap, reset
bindd = , comma, Settings, exec, dms ipc call settings focusOrToggle
bind  = , comma, submap, reset
bind  = , escape, submap, reset
bind  = , return, submap, reset
submap = reset


