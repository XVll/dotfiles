# CAPTURE — submap
# ═════════════════════════════════════════════════════════════════════════════

# Direct region screenshot (most-used, bare hardware key)
bind = , Print, exec, dms screenshot

# Capture submap for variants (home-row leader)
bindd = SUPER, P, Capture menu, exec, notify-send -t 3000 "Capture" "R=region  F=full  W=window  C=color pick" && hyprctl dispatch submap capture

submap = capture
bindd = , R, Screenshot region, exec, dms screenshot
bind  = , R, submap, reset
bindd = , F, Screenshot full, exec, dms screenshot full
bind  = , F, submap, reset
bindd = , W, Screenshot window, exec, dms screenshot window
bind  = , W, submap, reset
bindd = , C, Color picker, exec, dms color pick
bind  = , C, submap, reset
bind  = , escape, submap, reset
bind  = , return, submap, reset
submap = reset


# ═════════════════════════════════════════════════════════════════════════════
# SYSTEM — submap
# ═════════════════════════════════════════════════════════════════════════════

bindd = SUPER, BackSpace, System menu, exec, notify-send -t 3000 "System" "L=lock  E=exit  P=power  D=display off  N=nightlight" && hyprctl dispatch submap system

submap = system
bindd = , L, Lock, exec, dms ipc call lock lock
bind  = , L, submap, reset
bindd = , E, Exit session, exit
bind  = , E, submap, reset
bindd = , P, Power menu, exec, dms ipc call powermenu toggle
bind  = , P, submap, reset
bindd = , D, Toggle display off, dpms, toggle
bind  = , D, submap, reset
bindd = , N, Toggle nightlight, exec, dms ipc call night toggle
bind  = , N, submap, reset
bind  = , escape, submap, reset
bind  = , return, submap, reset
submap = reset


