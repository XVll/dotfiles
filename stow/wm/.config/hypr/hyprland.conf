# Learn how to configure Hyprland: https://wiki.hyprland.org/Configuring/

# ═══════════════════════════════════════════════════════════════════════════
# AUTOSTART
# ═══════════════════════════════════════════════════════════════════════════
# greetd launches plain `hyprland` (no uwsm). DMS provisions
# ~/.config/systemd/user/hyprland-session.target (Requires=graphical-session
# .target) and installs dms.service as a Want of it — so starting the target
# below pulls in graphical-session.target, which in turn launches DMS.
exec-once = dbus-update-activation-environment --systemd --all
exec-once = systemctl --user start hyprland-session.target


# ═══════════════════════════════════════════════════════════════════════════
# LAYER RULES
# ═══════════════════════════════════════════════════════════════════════════
# Skip Hyprland's layer animations on DMS's own surfaces — DMS draws its
# own fade/slide in Quickshell.
layerrule = no_anim on, match:namespace ^(quickshell)$
layerrule = no_anim on, match:namespace ^dms:.*


# ═══════════════════════════════════════════════════════════════════════════
# ENVIRONMENT
# ═══════════════════════════════════════════════════════════════════════════
# Toolkit Wayland backends (GTK/Qt/SDL/Electron).
env = GDK_BACKEND,wayland,x11,*
env = QT_QPA_PLATFORM,wayland;xcb
env = SDL_VIDEODRIVER,wayland,x11
env = OZONE_PLATFORM,wayland
env = ELECTRON_OZONE_PLATFORM_HINT,auto

# Qt apps pick up DMS's matugen-driven GTK theme (file dialogs, palette).
env = QT_QPA_PLATFORMTHEME,gtk3
env = QT_QPA_PLATFORMTHEME_QT6,gtk3

ecosystem {
    no_update_news = true
}


# ═══════════════════════════════════════════════════════════════════════════
# INPUT
# ═══════════════════════════════════════════════════════════════════════════
input {
    kb_layout = us,tr
    repeat_rate = 40
    numlock_by_default = true
}


# ═══════════════════════════════════════════════════════════════════════════
# MONITORS
# ═══════════════════════════════════════════════════════════════════════════
# Fallback — per-machine scale/position lives in DMS `dms/outputs.conf`
# (written by DMS Display Settings UI). See https://wiki.hyprland.org/Configuring/Monitors/
monitor = , preferred, auto, auto, vrr, 1


# ═══════════════════════════════════════════════════════════════════════════
# CORE CONFIG
# ═══════════════════════════════════════════════════════════════════════════
source = ~/.config/hypr/looknfeel.conf
source = ~/.config/hypr/windows.conf
source = ~/.config/hypr/bindings.conf


# ═══════════════════════════════════════════════════════════════════════════
# DMS-GENERATED (written at runtime; see .gitignore)
# ═══════════════════════════════════════════════════════════════════════════
# Sourced last so DMS's theme/layout/outputs/bindings override ours.
source = ./dms/colors.conf
source = ./dms/outputs.conf
source = ./dms/layout.conf
source = ./dms/cursor.conf
source = ./dms/binds.conf
source = ./dms/windowrules.conf
