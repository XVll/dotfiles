<?xml version="1.0"?>
<!DOCTYPE fontconfig SYSTEM "fonts.dtd">
<fontconfig>

  <!-- ── Family defaults ───────────────────────────────────────────────────── -->
  <!-- What apps get when they ask for a generic family name -->

  <match target="pattern">
    <test name="family" qual="any"><string>sans-serif</string></test>
    <edit name="family" mode="assign" binding="strong">
      <string>Liberation Sans</string>
    </edit>
  </match>

  <match target="pattern">
    <test name="family" qual="any"><string>serif</string></test>
    <edit name="family" mode="assign" binding="strong">
      <string>Liberation Serif</string>
    </edit>
  </match>

  <match target="pattern">
    <test name="family" qual="any"><string>monospace</string></test>
    <edit name="family" mode="assign" binding="strong">
      <string>JetBrainsMono Nerd Font</string>
    </edit>
  </match>

  <!-- ── Web compat aliases ────────────────────────────────────────────────── -->
  <!-- Chromium renders CSS font stacks that reference macOS/Windows font names.
       Map them to Liberation Sans so web pages don't fall back to random fonts. -->

  <alias>
    <family>system-ui</family>
    <prefer><family>Liberation Sans</family></prefer>
  </alias>

  <alias>
    <family>ui-monospace</family>
    <default><family>monospace</family></default>
  </alias>

  <alias>
    <family>-apple-system</family>
    <prefer><family>Liberation Sans</family></prefer>
  </alias>

  <alias>
    <family>BlinkMacSystemFont</family>
    <prefer><family>Liberation Sans</family></prefer>
  </alias>

  <!-- ── Emoji fallback ────────────────────────────────────────────────────── -->
  <!-- Appended to every family so emoji render wherever they appear -->

  <alias>
    <family>sans-serif</family>
    <accept><family>Noto Color Emoji</family></accept>
  </alias>

  <alias>
    <family>serif</family>
    <accept><family>Noto Color Emoji</family></accept>
  </alias>

  <alias>
    <family>monospace</family>
    <accept><family>Noto Color Emoji</family></accept>
  </alias>

</fontconfig>
