# matugen config — Material You color generation from wallpaper
# Used by: theme-set -w <wallpaper>

[config]
reload_apps = false  # we handle reload in theme-set script

[templates.waybar]
input_path = "~/.config/theme/templates/waybar.css"
output_path = "~/.config/theme/current/waybar.css"

[templates.swayosd]
input_path = "~/.config/theme/templates/swayosd.css"
output_path = "~/.config/theme/current/swayosd.css"

[templates.hyprland]
input_path = "~/.config/theme/templates/hyprland.conf"
output_path = "~/.config/theme/current/hyprland.conf"

[templates.ghostty]
input_path = "~/.config/theme/templates/ghostty.conf"
output_path = "~/.config/theme/current/ghostty.conf"
